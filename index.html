<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30 Avril - Pour Lucille</title>
  <style>
    :root {
      --rose: #ff6f9f;
      --rose-soft: #ffd4e3;
      --wine: #74244d;
      --plum: #341426;
      --cream: #fff7f0;
      --gold: #ffd283;
      --ink: #3c1530;
      --shadow: rgba(55, 9, 33, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
      color: var(--cream);
      font-family: "Georgia", "Times New Roman", serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 210, 131, 0.28), transparent 30%),
        radial-gradient(circle at 86% 12%, rgba(255, 111, 159, 0.34), transparent 28%),
        linear-gradient(145deg, #2a1024 0%, #55193e 42%, #8d2f5c 100%);
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -2;
      content: "";
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, transparent, black 15%, black 84%, transparent);
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: "";
      background:
        radial-gradient(circle at 50% 36%, transparent 0 24%, rgba(29, 7, 24, 0.28) 68%, rgba(20, 5, 16, 0.55) 100%);
    }

    main {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      padding: 28px;
      transition: opacity 1200ms ease, visibility 1200ms ease, transform 1200ms ease;
    }

    .intro.hidden {
      visibility: hidden;
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    .image-button {
      position: relative;
      width: min(72vw, 390px);
      max-height: min(82vh, 620px);
      padding: 0;
      overflow: hidden;
      appearance: none;
      cursor: pointer;
      border: 0;
      border-radius: 8px;
      background: transparent;
      box-shadow: 0 32px 80px var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.22);
      animation: portraitFloat 4800ms ease-in-out infinite;
    }

    .image-button::before {
      position: absolute;
      inset: -2px;
      z-index: 1;
      content: "";
      background: linear-gradient(120deg, transparent 18%, rgba(255, 255, 255, 0.55) 48%, transparent 76%);
      transform: translateX(-130%);
      animation: shine 3300ms ease-in-out infinite;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .image-button::after {
      position: absolute;
      inset: 0;
      content: "";
      border: 1px solid rgba(255, 247, 240, 0.44);
      border-radius: 8px;
      box-shadow: inset 0 0 34px rgba(255, 212, 227, 0.22);
      pointer-events: none;
    }

    .image-button:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 8px;
    }

    .image-button img {
      display: block;
      width: 100%;
      height: 100%;
      max-height: min(82vh, 620px);
      object-fit: cover;
      transform: scale(1.015);
    }

    .letter-scene {
      position: relative;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: clamp(28px, 5vw, 72px) 18px;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1100ms ease 420ms, transform 1100ms ease 420ms;
    }

    .letter-scene.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .letter {
      position: relative;
      width: min(760px, 100%);
      padding: clamp(24px, 5vw, 58px);
      overflow: hidden;
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 8px;
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.94), rgba(255, 242, 235, 0.9)),
        radial-gradient(circle at 20% 15%, rgba(255, 111, 159, 0.22), transparent 32%);
      box-shadow: 0 28px 90px rgba(37, 5, 26, 0.38);
    }

    .letter::before {
      position: absolute;
      inset: 13px;
      content: "";
      border: 1px solid rgba(116, 36, 77, 0.13);
      border-radius: 6px;
      pointer-events: none;
    }

    .letter::after {
      position: absolute;
      right: -72px;
      bottom: -82px;
      width: 210px;
      height: 210px;
      content: "";
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 111, 159, 0.2), transparent 70%);
      pointer-events: none;
    }

    .message {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin: 0;
      font-size: clamp(1.08rem, 2vw, 1.42rem);
      line-height: 1.34;
      letter-spacing: 0;
    }

    .line {
      min-height: 1.1em;
      margin: 0;
      opacity: 0;
      filter: blur(8px);
      transform: translateY(12px);
      transition: opacity 900ms ease, filter 900ms ease, transform 900ms ease;
      text-wrap: balance;
    }

    .line.revealed {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    .line.spacer {
      min-height: clamp(11px, 1.8vw, 18px);
    }

    .typed {
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 0.56em;
      margin-left: 2px;
      color: #c32764;
      animation: blink 860ms steps(2, start) infinite;
    }

    .line:not(.typing) .cursor {
      display: none;
    }

    .line.title {
      margin-bottom: 0;
      color: var(--wine);
      font-size: clamp(1.45rem, 4.6vw, 2.65rem);
      font-weight: 700;
      line-height: 1.08;
      text-align: center;
      text-shadow: 0 0 18px rgba(255, 111, 159, 0.24);
    }

    .line.signature {
      margin-top: 0;
      color: #c32764;
      font-size: clamp(1.8rem, 6vw, 3.1rem);
      line-height: 1;
      text-align: center;
      animation: heartbeat 1800ms ease-in-out infinite;
    }

    .line:nth-child(4n + 1) {
      color: #74244d;
    }

    .line:nth-child(4n + 2) {
      color: #a42363;
    }

    .line:nth-child(4n + 3) {
      color: #5b244d;
    }

    .line:nth-child(4n) {
      color: #bf456f;
    }

    .particle {
      position: fixed;
      left: var(--x);
      bottom: -24px;
      z-index: 0;
      width: var(--size);
      height: var(--size);
      pointer-events: none;
      opacity: 0;
      transform: rotate(45deg);
      animation: drift var(--duration) linear var(--delay) infinite;
    }

    .particle::before,
    .particle::after {
      position: absolute;
      content: "";
      background: var(--color);
      border-radius: 999px 999px 0 0;
    }

    .particle::before {
      left: 0;
      top: 30%;
      width: 100%;
      height: 70%;
      border-radius: 0 0 4px 4px;
    }

    .particle::after {
      left: 30%;
      top: 0;
      width: 70%;
      height: 70%;
    }

    .particle span {
      position: absolute;
      left: 0;
      top: 0;
      width: 70%;
      height: 70%;
      background: var(--color);
      border-radius: 999px;
    }

    .spark {
      position: fixed;
      left: var(--x);
      top: var(--y);
      z-index: 7;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 18px var(--gold);
      pointer-events: none;
      animation: burst 1000ms ease-out forwards;
    }

    .music-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5;
      display: grid;
      width: 46px;
      height: 46px;
      place-items: center;
      color: #7f244e;
      font-size: 1.3rem;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      background: rgba(255, 247, 240, 0.84);
      box-shadow: 0 14px 34px rgba(37, 5, 26, 0.22);
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 600ms ease, transform 600ms ease;
      backdrop-filter: blur(12px);
      cursor: pointer;
    }

    .music-toggle.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .music-toggle:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 4px;
    }

    @keyframes portraitFloat {
      0%,
      100% {
        transform: translateY(0) rotate(-0.35deg);
      }

      50% {
        transform: translateY(-12px) rotate(0.35deg);
      }
    }

    @keyframes shine {
      0%,
      42% {
        transform: translateX(-130%);
      }

      75%,
      100% {
        transform: translateX(130%);
      }
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @keyframes heartbeat {
      0%,
      100% {
        transform: scale(1);
      }

      16% {
        transform: scale(1.12);
      }

      32% {
        transform: scale(1);
      }
    }

    @keyframes drift {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(45deg) scale(0.7);
      }

      12% {
        opacity: 0.72;
      }

      100% {
        opacity: 0;
        transform: translate3d(var(--sway), -112vh, 0) rotate(405deg) scale(1.15);
      }
    }

    @keyframes burst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.6);
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(1.8);
      }
    }

    @media (max-width: 620px) {
      .intro {
        padding: 18px;
      }

      .image-button {
        width: min(84vw, 360px);
      }

      .letter-scene {
        align-items: start;
        padding-top: 22px;
      }

      .letter {
        padding: 28px 20px;
      }

      .message {
        gap: 3px;
        line-height: 1.32;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="intro" id="intro" aria-label="Une surprise pour Lucille">
      <button class="image-button" id="openLetter" type="button" aria-label="Ouvrir le message de Lucille">
        <img src="30avril2026.png" alt="Surprise du 30 avril 2026 pour Lucille">
      </button>
    </section>

    <section class="letter-scene" id="letterScene" aria-live="polite">
      <article class="letter">
        <div class="message" id="message"></div>
      </article>
    </section>

    <button class="music-toggle" id="musicToggle" type="button" aria-label="Couper la musique">♪</button>
    <audio id="romanticMusic" src="music30.m4a" preload="auto" loop></audio>
  </main>

  <script>
    const messageLines = [
      { text: "💌 Message – 30 Avril", type: "title" },
      { text: "", type: "spacer" },
      { text: "Mon amour, ma Lucille," },
      { text: "", type: "spacer" },
      { text: "Depuis quelques jours…" },
      { text: "Je t’ai guidée… doucement…" },
      { text: "Vers ce moment…" },
      { text: "", type: "spacer" },
      { text: "Et aujourd’hui…" },
      { text: "Nous y sommes…" },
      { text: "", type: "spacer" },
      { text: "Ce soir… ce n’est pas juste une surprise…" },
      { text: "", type: "spacer" },
      { text: "C’est un instant que j’ai imaginé pour toi…" },
      { text: "Pour nous…" },
      { text: "", type: "spacer" },
      { text: "Parce que tu mérites bien plus qu’un simple anniversaire…" },
      { text: "Tu mérites d’être célébrée…" },
      { text: "D’être choyée…" },
      { text: "D’être aimée comme tu le mérites…" },
      { text: "", type: "spacer" },
      { text: "✨" },
      { text: "", type: "spacer" },
      { text: "Ce soir…" },
      { text: "Je veux voir tes yeux briller…" },
      { text: "Ton sourire apparaître…" },
      { text: "", type: "spacer" },
      { text: "Et que tu oublies tout le reste…" },
      { text: "", type: "spacer" },
      { text: "Juste toi…" },
      { text: "Juste nous…" },
      { text: "", type: "spacer" },
      { text: "❤️", type: "signature" },
      { text: "", type: "spacer" },
      { text: "Joyeux anniversaire, mon amour…" },
      { text: "", type: "spacer" },
      { text: "Je t'aime pour l'éternité et je serais la à jamais pour toi et dans ton coeur." }
    ];

    const intro = document.querySelector("#intro");
    const openLetter = document.querySelector("#openLetter");
    const letterScene = document.querySelector("#letterScene");
    const message = document.querySelector("#message");
    const music = document.querySelector("#romanticMusic");
    const musicToggle = document.querySelector("#musicToggle");
    let opened = false;
    let musicFade = null;

    function createFloatingHearts() {
      const colors = ["#ff8eb3", "#ffd283", "#fff0f5", "#ef5d8f"];

      for (let index = 0; index < 28; index += 1) {
        const heart = document.createElement("span");
        const inner = document.createElement("span");
        const size = 9 + Math.random() * 18;

        heart.className = "particle";
        heart.style.setProperty("--x", `${Math.random() * 100}vw`);
        heart.style.setProperty("--size", `${size}px`);
        heart.style.setProperty("--sway", `${-42 + Math.random() * 84}px`);
        heart.style.setProperty("--duration", `${9 + Math.random() * 8}s`);
        heart.style.setProperty("--delay", `${Math.random() * -12}s`);
        heart.style.setProperty("--color", colors[index % colors.length]);
        heart.appendChild(inner);
        document.body.appendChild(heart);
      }
    }

    function createSparkBurst() {
      const rect = openLetter.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      for (let index = 0; index < 42; index += 1) {
        const spark = document.createElement("span");
        const angle = (Math.PI * 2 * index) / 42;
        const distance = 60 + Math.random() * 170;

        spark.className = "spark";
        spark.style.setProperty("--x", `${centerX}px`);
        spark.style.setProperty("--y", `${centerY}px`);
        spark.style.setProperty("--tx", `${Math.cos(angle) * distance}px`);
        spark.style.setProperty("--ty", `${Math.sin(angle) * distance}px`);
        document.body.appendChild(spark);
        spark.addEventListener("animationend", () => spark.remove(), { once: true });
      }
    }

    function wait(duration) {
      return new Promise((resolve) => {
        window.setTimeout(resolve, duration);
      });
    }

    function typeText(target, text) {
      const letters = Array.from(text);
      let index = 0;

      return new Promise((resolve) => {
        function writeNextLetter() {
          target.textContent = letters.slice(0, index).join("");
          index += 1;

          if (index <= letters.length) {
            window.setTimeout(writeNextLetter, 34 + Math.random() * 36);
            return;
          }

          resolve();
        }

        writeNextLetter();
      });
    }

    function createLine(line) {
      const paragraph = document.createElement("p");
      paragraph.className = "line";

      if (line.type === "title") {
        paragraph.classList.add("title");
      }

      if (line.type === "signature") {
        paragraph.classList.add("signature");
      }

      if (line.type === "spacer") {
        paragraph.classList.add("spacer", "revealed");
        return paragraph;
      }

      const typed = document.createElement("span");
      const cursor = document.createElement("span");

      typed.className = "typed";
      cursor.className = "cursor";
      cursor.textContent = "|";
      paragraph.append(typed, cursor);
      return paragraph;
    }

    async function revealMessage() {
      for (const line of messageLines) {
        const paragraph = createLine(line);
        message.appendChild(paragraph);

        if (line.type === "spacer") {
          await wait(250);
          continue;
        }

        await wait(2000);
        paragraph.classList.add("revealed", "typing");
        paragraph.scrollIntoView({ behavior: "smooth", block: "nearest" });
        await typeText(paragraph.querySelector(".typed"), line.text);
        paragraph.classList.remove("typing");
      }
    }

    function startMusic() {
      music.volume = 0;
      music.play().then(() => {
        musicToggle.classList.add("visible");
        musicFade = window.setInterval(() => {
          music.volume = Math.min(0.72, music.volume + 0.04);

          if (music.volume >= 0.72) {
            window.clearInterval(musicFade);
          }
        }, 160);
      }).catch(() => {
        musicToggle.classList.remove("visible");
      });
    }

    function openExperience() {
      if (opened) {
        return;
      }

      opened = true;
      createSparkBurst();
      intro.classList.add("hidden");
      letterScene.classList.add("visible");
      startMusic();
      revealMessage();
    }

    musicToggle.addEventListener("click", () => {
      music.muted = !music.muted;
      musicToggle.textContent = music.muted ? "×" : "♪";
      musicToggle.setAttribute("aria-label", music.muted ? "Remettre la musique" : "Couper la musique");
    });

    createFloatingHearts();
    openLetter.addEventListener("click", openExperience);
  </script>
</body>
</html>
