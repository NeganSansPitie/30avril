<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30 Avril - Pour Lucille</title>
  <style>
    :root {
      --night: #070711;
      --wine: #3a0618;
      --ruby: #951b3e;
      --rose: #ff5f93;
      --gold: #ffd36e;
      --mint: #7fffe0;
      --ivory: #fff8eb;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ivory);
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 211, 110, .22), transparent 28%),
        radial-gradient(circle at 88% 16%, rgba(127, 255, 224, .16), transparent 28%),
        radial-gradient(circle at 58% 82%, rgba(255, 95, 147, .24), transparent 34%),
        linear-gradient(145deg, var(--night), #160916 44%, var(--wine));
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -3;
      content: "";
      opacity: .5;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,211,110,.8) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(127,255,224,.55) 0 1px, transparent 1.8px);
      background-position: 0 0, 40px 72px, 110px 28px;
      background-size: 170px 170px, 235px 235px, 315px 315px;
      animation: stars 28s linear infinite;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: -2;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,211,110,.08), transparent 24%, transparent 76%, rgba(127,255,224,.08)),
        radial-gradient(circle at 50% 18%, transparent 0 24%, rgba(0,0,0,.42) 82%);
    }

    main {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .aurora {
      position: fixed;
      inset: auto -16vw -28vh;
      z-index: -1;
      height: 56vh;
      pointer-events: none;
      filter: blur(26px);
      opacity: .84;
      background:
        conic-gradient(from 220deg at 18% 100%, transparent, rgba(255,211,110,.2), transparent 24%),
        conic-gradient(from 144deg at 72% 100%, transparent, rgba(255,95,147,.24), transparent 25%),
        conic-gradient(from 196deg at 48% 100%, transparent, rgba(127,255,224,.15), transparent 28%);
      animation: breathe 6s ease-in-out infinite;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 22px;
      background: radial-gradient(circle at 50% 44%, rgba(255,211,110,.16), transparent 34%), rgba(7,7,17,.88);
      backdrop-filter: blur(10px);
      transition: opacity 1.1s ease, visibility 1.1s ease, transform 1.1s ease;
    }

    .intro.hidden {
      visibility: hidden;
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    .opening {
      position: relative;
      isolation: isolate;
      width: min(78vw, 420px);
      padding: clamp(15px, 2.8vw, 22px);
      color: var(--ivory);
      appearance: none;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid rgba(255,248,235,.44);
      border-radius: 8px;
      background: linear-gradient(150deg, rgba(255,255,255,.16), rgba(255,255,255,.04)), rgba(255,248,235,.07);
      box-shadow: 0 32px 90px rgba(0,0,0,.52), 0 0 38px rgba(255,211,110,.18), inset 0 0 34px rgba(255,255,255,.08);
      animation: float 5.2s ease-in-out infinite;
    }

    .opening::before {
      position: absolute;
      inset: -3px;
      z-index: -1;
      content: "";
      border-radius: 10px;
      background: linear-gradient(115deg, var(--gold), var(--rose), var(--mint), #ff9f45, var(--gold));
      background-size: 320% 320%;
      animation: borderLight 4.8s linear infinite;
    }

    .opening::after {
      position: absolute;
      inset: 14px;
      content: "";
      border: 1px solid rgba(255,248,235,.44);
      border-radius: 6px;
      box-shadow: inset 0 0 42px rgba(255,211,110,.16);
      pointer-events: none;
    }

    .opening:focus-visible,
    .music:focus-visible {
      outline: 3px solid var(--mint);
      outline-offset: 5px;
    }

    .opening img {
      display: block;
      width: 100%;
      height: min(58vh, 500px);
      object-fit: cover;
      border-radius: 5px;
      box-shadow: 0 20px 46px rgba(0,0,0,.38);
    }

    .opening strong,
    .opening span {
      display: block;
      text-align: center;
    }

    .opening strong {
      margin-top: 18px;
      color: var(--gold);
      font-size: clamp(2.1rem, 9vw, 4.7rem);
      line-height: .95;
      text-shadow: 0 0 18px rgba(255,211,110,.62), 0 0 34px rgba(255,95,147,.42);
    }

    .opening span {
      margin-top: 8px;
      font-size: clamp(1rem, 3.1vw, 1.45rem);
    }

    .scene {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      opacity: 0;
      transition: opacity .9s ease .25s;
    }

    .scene.visible {
      opacity: 1;
    }

    .story-stage {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: clamp(34px, 7vw, 72px) 18px;
      text-align: center;
    }

    .story-shell {
      position: relative;
      width: min(1180px, 100%);
      min-height: min(760px, 86vh);
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
    }

    .date,
    .story-line,
    .stage-finale {
      opacity: 0;
      filter: blur(12px);
      transform: translateY(18px);
      transition: opacity 1.1s ease, filter 1.1s ease, transform 1.1s ease;
    }

    .date {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 16px;
      color: var(--mint);
      font-size: clamp(.98rem, 2.3vw, 1.22rem);
      border: 1px solid rgba(127,255,224,.34);
      border-radius: 999px;
      background: rgba(127,255,224,.08);
      box-shadow: 0 0 24px rgba(127,255,224,.14);
    }

    .magic-message {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: min(900px, 100%);
      min-height: min(620px, 72vh);
      margin: 32px auto 0;
      color: rgba(255,248,235,.9);
      font-size: clamp(1rem, 2vw, 1.36rem);
      line-height: 1.3;
      text-align: center;
      text-shadow: 0 0 18px rgba(255,255,255,.18);
    }

    .story-stage.ready .date,
    .line.revealed,
    .stage-finale.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    .line {
      min-height: 1.1em;
      margin: 0;
      opacity: 0;
      filter: blur(8px);
      transform: translateY(12px);
      transition: opacity 900ms ease, filter 900ms ease, transform 900ms ease;
      text-wrap: balance;
    }

    .line.spacer {
      min-height: clamp(8px, 1.2vw, 14px);
    }

    .typed {
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: .56em;
      margin-left: 2px;
      color: var(--gold);
      animation: blink 860ms steps(2, start) infinite;
    }

    .line:not(.typing) .cursor {
      display: none;
    }

    .line.title {
      color: var(--gold);
      font-size: clamp(1.45rem, 4.6vw, 2.65rem);
      font-weight: 700;
      line-height: 1.08;
      text-shadow: 0 0 20px rgba(255,211,110,.48), 0 0 42px rgba(255,95,147,.28);
    }

    .line.signature {
      color: #ffb3cc;
      font-size: clamp(1.8rem, 6vw, 3.1rem);
      line-height: 1;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .stage-finale {
      display: none;
      width: min(1000px, 100%);
      margin: 34px auto 0;
      color: #ffb3cc;
      font-size: clamp(3rem, 12vw, 9.4rem);
      line-height: .94;
      text-align: center;
      text-shadow: 0 0 18px rgba(255,179,204,.62), 0 0 42px rgba(255,130,180,.42), 0 0 82px rgba(255,100,160,.28);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .stage-finale.visible {
      display: block;
    }

    .story-shell.finale-mode .magic-message {
      min-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .music {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 8;
      display: grid;
      width: 46px;
      height: 46px;
      place-items: center;
      color: var(--ivory);
      font-size: 1.42rem;
      border: 1px solid rgba(255,248,235,.42);
      border-radius: 50%;
      background: rgba(255,248,235,.1);
      box-shadow: 0 12px 30px rgba(0,0,0,.28);
      opacity: 0;
      cursor: pointer;
      transform: translateY(14px);
      transition: opacity .52s ease, transform .52s ease;
      pointer-events: none;
      backdrop-filter: blur(12px);
    }

    .music.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    @keyframes stars {
      to { background-position: 170px 170px, 275px 307px, 425px 343px; }
    }

    @keyframes breathe {
      50% { opacity: .96; transform: scaleX(1.04); }
    }

    @keyframes borderLight {
      to { background-position: 280% 0; }
    }

    @keyframes float {
      50% { transform: translateY(-13px) rotate(.28deg); }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes pulse {
      50% { transform: scale(1.035); }
    }

    @media (max-width: 760px) {
      .opening { width: min(88vw, 380px); }
      .opening img { height: min(54vh, 440px); }
      .story-stage { min-height: 100vh; }
      .story-shell { min-height: 86vh; }
      .magic-message {
        min-height: 70vh;
        margin-top: 24px;
        font-size: clamp(.94rem, 4vw, 1.12rem);
        line-height: 1.24;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="fireworks" aria-hidden="true"></canvas>
  <div class="aurora" aria-hidden="true"></div>

  <main>
    <section class="intro" id="intro" aria-label="Surprise du 26 avril">
      <button class="opening" id="openExperience" type="button" aria-label="Ouvrir le message">
        <img src="30avril2026.png" alt="Surprise du 26 avril 2026 pour Lucille">
        <strong>30 Avril</strong>
        <span>Ce soir, tout commence</span>
      </button>
    </section>

    <section class="scene" id="scene" aria-live="polite">
      <div class="story-stage" id="storyStage">
        <div class="story-shell" id="storyShell">
          <span class="date">30 Avril | La surprise</span>
          <div class="magic-message" id="message"></div>
          <h2 class="stage-finale" id="stageFinale">Joyeux anniversaire, mon amour.</h2>
        </div>
      </div>
    </section>

    <button class="music" id="musicToggle" type="button" aria-label="Couper la musique">♪</button>
    <audio id="romanticMusic" src="music30.m4a" preload="auto" loop></audio>
  </main>

  <script>
    const messageLines = [
      { text: "💌 Message – 30 Avril", type: "title" },
      { text: "", type: "spacer" },
      { text: "Mon amour, ma Lucille," },
      { text: "", type: "spacer" },
      { text: "Depuis quelques jours…" },
      { text: "Je t’ai guidée… doucement…" },
      { text: "Vers ce moment…" },
      { text: "", type: "spacer" },
      { text: "Et aujourd’hui…" },
      { text: "Nous y sommes…" },
      { text: "", type: "spacer" },
      { text: "Ce soir… ce n’est pas juste une surprise…" },
      { text: "", type: "spacer" },
      { text: "C’est un instant que j’ai imaginé pour toi…" },
      { text: "Pour nous…" },
      { text: "", type: "spacer" },
      { text: "Parce que tu mérites bien plus qu’un simple anniversaire…" },
      { text: "Tu mérites d’être célébrée…" },
      { text: "D’être choyée…" },
      { text: "D’être aimée comme tu le mérites…" },
      { text: "", type: "spacer" },
      { text: "✨" },
      { text: "", type: "spacer" },
      { text: "Ce soir…" },
      { text: "Je veux voir tes yeux briller…" },
      { text: "Ton sourire apparaître…" },
      { text: "", type: "spacer" },
      { text: "Et que tu oublies tout le reste…" },
      { text: "", type: "spacer" },
      { text: "Juste toi…" },
      { text: "Juste nous…" },
      { text: "", type: "spacer" },
      { text: "❤️", type: "signature" },
      { text: "", type: "spacer" },
      { text: "Joyeux anniversaire, mon amour…" },
      { text: "", type: "spacer" },
      { text: "Je t'aime pour l'éternité et je serais la à jamais pour toi et dans ton coeur." }
    ];

    const intro = document.querySelector("#intro");
    const openExperience = document.querySelector("#openExperience");
    const scene = document.querySelector("#scene");
    const storyStage = document.querySelector("#storyStage");
    const storyShell = document.querySelector("#storyShell");
    const message = document.querySelector("#message");
    const stageFinale = document.querySelector("#stageFinale");
    const music = document.querySelector("#romanticMusic");
    const musicToggle = document.querySelector("#musicToggle");
    const canvas = document.querySelector("#fireworks");
    const ctx = canvas.getContext("2d");
    const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

    let opened = false;
    let width = 0;
    let height = 0;
    let nextBurst = 0;
    let particles = [];

    function resize() {
      const scale = devicePixelRatio || 1;
      width = innerWidth;
      height = innerHeight;
      canvas.width = Math.floor(width * scale);
      canvas.height = Math.floor(height * scale);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
    }

    function burst(x, y, force = 1) {
      if (reduceMotion) return;
      const colors = ["#ffd36e", "#ff5f93", "#7fffe0", "#fff8eb", "#ff9f45"];

      for (let index = 0; index < Math.floor(58 * force); index += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.7 + Math.random() * 5.6 * force;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 76 + Math.random() * 32,
          size: 1.2 + Math.random() * 2.8,
          color: colors[index % colors.length],
          gravity: .028 + Math.random() * .025
        });
      }
    }

    function fireworks(now = 0) {
      ctx.clearRect(0, 0, width, height);

      if (opened && now > nextBurst) {
        burst(width * (.14 + Math.random() * .72), height * (.12 + Math.random() * .46), .8 + Math.random() * .7);
        nextBurst = now + 900 + Math.random() * 980;
      }

      particles = particles.filter((particle) => {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += particle.gravity;
        particle.vx *= .992;
        particle.vy *= .992;
        particle.life -= 1;

        const alpha = Math.max(particle.life / 100, 0);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = particle.color;
        ctx.shadowColor = particle.color;
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
        return particle.life > 0;
      });

      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      requestAnimationFrame(fireworks);
    }

    function wait(duration) {
      return new Promise((resolve) => {
        setTimeout(resolve, duration);
      });
    }

    function typeText(target, text) {
      const letters = Array.from(text);
      let index = 0;

      return new Promise((resolve) => {
        function writeNextLetter() {
          target.textContent = letters.slice(0, index).join("");
          index += 1;

          if (index <= letters.length) {
            setTimeout(writeNextLetter, 34 + Math.random() * 36);
            return;
          }

          resolve();
        }

        writeNextLetter();
      });
    }

    function createLine(line) {
      const paragraph = document.createElement("p");
      paragraph.className = "line";

      if (line.type === "title") {
        paragraph.classList.add("title");
      }

      if (line.type === "signature") {
        paragraph.classList.add("signature");
      }

      if (line.type === "spacer") {
        paragraph.classList.add("spacer", "revealed");
        return paragraph;
      }

      const typed = document.createElement("span");
      const cursor = document.createElement("span");

      typed.className = "typed";
      cursor.className = "cursor";
      cursor.textContent = "|";
      paragraph.append(typed, cursor);
      return paragraph;
    }

    async function revealMessage() {
      for (const line of messageLines) {
        const paragraph = createLine(line);
        message.appendChild(paragraph);

        if (line.type === "spacer") {
          await wait(250);
          continue;
        }

        await wait(2000);
        paragraph.classList.add("revealed", "typing");
        await typeText(paragraph.querySelector(".typed"), line.text);
        paragraph.classList.remove("typing");
      }

      await wait(2200);
      message.style.display = "none";
      storyShell.classList.add("finale-mode");

      setTimeout(() => {
        stageFinale.classList.add("visible");
      }, 900);
    }

    function startStory() {
      storyStage.classList.add("ready");
      setTimeout(revealMessage, 1400);
    }

    function startMusic() {
      music.volume = 0;
      music.play().then(() => {
        musicToggle.classList.add("visible");
        const fade = setInterval(() => {
          music.volume = Math.min(.74, music.volume + .035);
          if (music.volume >= .74) clearInterval(fade);
        }, 140);
      }).catch(() => {
        musicToggle.classList.remove("visible");
      });
    }

    function openGrandFinal() {
      if (opened) return;
      opened = true;
      intro.classList.add("hidden");
      scene.classList.add("visible");
      startMusic();
      startStory();
      burst(width / 2, height * .34, 1.7);
    }

    musicToggle.addEventListener("click", () => {
      music.muted = !music.muted;
      musicToggle.textContent = music.muted ? "×" : "♪";
      musicToggle.setAttribute("aria-label", music.muted ? "Remettre la musique" : "Couper la musique");
    });

    openExperience.addEventListener("click", openGrandFinal);
    addEventListener("resize", resize);
    resize();
    requestAnimationFrame(fireworks);
  </script>
</body>
</html>
